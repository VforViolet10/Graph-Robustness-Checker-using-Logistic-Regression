<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graph Robustness Leaderboard</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    margin: 0;
    background: #ffffff;
    color: #111;
}

/* Header */
.header {
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #eee;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

/* Container */
.container {
    width: 90%;
    margin: auto;
    margin-top: 30px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
}

th {
    background: #f5f5f5;
    padding: 12px;
    text-align: left;
    border-bottom: 2px solid #ddd;
}

td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f9f9f9;
}

/* Rank styling */
.rank-1 { font-weight: bold; }
.rank-2 { font-weight: bold; }
.rank-3 { font-weight: bold; }

/* Tabs */
.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 20px;
    border: 1px solid #ddd;
    cursor: pointer;
    background: #fafafa;
}

.tab.active {
    background: #2563eb;
    color: white;
}

/* Footer */
.footer {
    text-align: center;
    margin: 30px;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<div class="header">
    <h1>🏆 Graph Robustness Leaderboard</h1>
    <p>Inspired by GTA Graph Topology Ablation</p>
</div>

<div class="container">

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="loadData('leaderboard.csv')">Public Leaderboard</div>
        <div class="tab" onclick="loadData('private.csv')">Private Leaderboard</div>
    </div>

    <!-- Table -->
    <table id="leaderboard">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Username</th>
                <th>Model</th>
                <th>Score</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<div class="footer">
    Built for Graph Robustness Challenge 🚀
</div>

<script>
function loadData(file) {
    fetch(file)
    .then(res => res.text())
    .then(data => {
        const rows = data.split('\\n').slice(1);
        let parsed = rows.map(r => r.split(','));

        // Sort by score DESC
        parsed.sort((a, b) => parseFloat(b[2]) - parseFloat(a[2]));

        const table = document.querySelector("#leaderboard tbody");
        table.innerHTML = "";

        parsed.forEach((row, index) => {
            if (row.length < 4) return;

            let rank = index + 1;
            let medal = rank === 1 ? "🥇" :
                        rank === 2 ? "🥈" :
                        rank === 3 ? "🥉" : rank;

            let tr = document.createElement("tr");

            tr.innerHTML = `
                <td class="rank-${rank}">${medal}</td>
                <td>${row[0]}</td>
                <td>${row[1]}</td>
                <td>${parseFloat(row[2]).toFixed(4)}</td>
                <td>${row[3]}</td>
            `;

            table.appendChild(tr);
        });

        // Tab switching UI
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        event.target.classList.add("active");
    });
}

// Load default
loadData('leaderboard.csv');
</script>

</body>
</html>
