name: Update Leaderboard

on:
  push:
    branches: [ main ]

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Run leaderboard update
        run: python update_leaderboard.py   # adjust if needed

      - name: Commit leaderboard
        run: |
          git config user.name "leaderboard-bot"
          git config user.email "bot@github.com"
          git add docs/leaderboard.csv
          git commit -m "Auto update leaderboard" || echo "No changes"
          git push origin main
