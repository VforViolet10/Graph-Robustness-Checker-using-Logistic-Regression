name: Update Leaderboard

on:
  pull_request:
    branches: [ main ]

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install pandas

      - name: Run leaderboard update
        run: python update_leaderboard.py

      - name: Commit changes
        run: |
          git config --global user.name "leaderboard-bot"
          git config --global user.email "bot@example.com"
          git add docs/leaderboard.csv
          git commit -m "Auto update leaderboard" || echo "No changes"
          git push
