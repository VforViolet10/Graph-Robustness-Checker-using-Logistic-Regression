name: Update Leaderboard

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  leaderboard:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - run: pip install -r requirements.txt

      - name: Process merged submission
        run: python .github/scripts/process_submission.py

      - name: Update leaderboard
        run: python leaderboard/calculate_scores.py

      - name: Commit leaderboard
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add docs/leaderboard.json

          if ! git diff --cached --quiet; then
            git commit -m "Auto update leaderboard"
            git push origin main
          else
            echo "No leaderboard changes"
          fi
