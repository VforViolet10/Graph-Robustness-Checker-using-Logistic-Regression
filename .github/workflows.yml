name: Process ML Submissions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Processing Script
        run: |
          python .github/scripts/process_submission.py

      - name: Commit Leaderboard
        run: |
          git config user.name "MLBot"
          git config user.email "bot@noreply.github.com"
          git add leaderboard/
          git commit -m "Updated leaderboard" || echo "No changes"
          git push
