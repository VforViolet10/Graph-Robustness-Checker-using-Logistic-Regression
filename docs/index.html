<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Robustness Challenge - Leaderboard</title>
    <link rel="stylesheet" href="leaderboard.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🏆 ML Robustness Leaderboard</h1>
            <p>Graph Features + Logistic Regression (Noise Stability Test)</p>
        </div>

        <p class="last-updated" id="last-updated">Loading...</p>

        <div class="leaderboard">
            <table>
                <thead>
                    <tr>
                        <th class="rank">Rank</th>
                        <th>Team</th>
                        <th>F1 (Ideal)</th>
                        <th>F1 (Perturbed)</th>
                        <th>Robustness Gap</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="5" class="empty">Loading leaderboard data...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>Submit your solution via Pull Request!</p>
            <p style="margin-top: 10px;">
                <a href="#" target="_blank">
                    🔗 View Repository on GitHub
                </a>
            </p>
        </div>
    </div>

    <script src="leaderboard.js"></script>
</body>
</html>
