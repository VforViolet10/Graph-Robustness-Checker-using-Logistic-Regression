<script>
async function loadLeaderboard() {
  try {
    const res = await fetch(
      "./leaderboard.json?nocache=" + Date.now(),
      { cache: "no-store" }
    );

    if (!res.ok) throw new Error("Leaderboard file not found");

    const data = await res.json();

    const tbody = document.getElementById("leaderboard-body");

    if (!data || data.length === 0) {
      tbody.innerHTML =
        "<tr><td colspan='4'>No submissions yet</td></tr>";
      return;
    }

    data.sort((a,b)=>b.f1_score-a.f1_score);

    tbody.innerHTML = "";

    data.forEach((entry,index)=>{
      const medals=["🥇","🥈","🥉"];
      const rank = medals[index] || (index+1);

      tbody.innerHTML += `
        <tr>
          <td>${rank}</td>
          <td>${entry.group}</td>
          <td>${Number(entry.f1_score).toFixed(4)}</td>
          <td>#${entry.pr || "-"}</td>
        </tr>
      `;
    });

    document.getElementById("last-updated").innerText =
      "Last updated: " + new Date().toLocaleString();

  } catch(err){
    document.getElementById("leaderboard-body").innerHTML =
      "<tr><td colspan='4'>Error loading leaderboard</td></tr>";

    console.error("Leaderboard load error:", err);
  }
}

loadLeaderboard();

/* auto-refresh */
setInterval(loadLeaderboard, 5000);
</script>
