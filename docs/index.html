<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
            color: black;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ccc;
        }
        th {
            background: #6366f1;
            color: white;
        }
    </style>
</head>

<body>

<h1>🏆 Graph Robustness Leaderboard</h1>

<table id="leaderboard"></table>

<script>
fetch('leaderboard.csv')
.then(response => response.text())
.then(data => {
    const rows = data.split('\n').map(r => r.split(','));
    let html = "";

    rows.forEach((row, i) => {
        html += "<tr>";
        row.forEach(col => {
            html += i === 0 ? `<th>${col}</th>` : `<td>${col}</td>`;
        });
        html += "</tr>";
    });

    document.getElementById("leaderboard").innerHTML = html;
});
</script>

</body>
</html>
