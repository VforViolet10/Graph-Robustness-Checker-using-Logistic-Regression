<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graph Robustness Leaderboard</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    margin: 0;
    background: #ffffff;
    color: #111;
}

.header {
    padding: 25px;
    text-align: center;
    border-bottom: 2px solid #eee;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

.header p {
    color: #666;
}

.container {
    width: 90%;
    margin: auto;
    margin-top: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
}

th {
    background: #f5f5f5;
    padding: 12px;
    text-align: left;
    border-bottom: 2px solid #ddd;
}

td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f9f9f9;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 18px;
    border: 1px solid #ddd;
    cursor: pointer;
    background: #fafafa;
    border-radius: 6px;
}

.tab.active {
    background: #2563eb;
    color: white;
}

.footer {
    text-align: center;
    margin: 30px;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<div class="header">
    <h1>🏆 Graph Robustness Leaderboard</h1>
    <p>ML Challenge • PR Submission System</p>
</div>

<div class="container">

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="loadData('leaderboard.csv', this)">
            Public Leaderboard
        </div>
        <div class="tab" onclick="loadData('private.csv', this)">
            Private Leaderboard
        </div>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>F1 Ideal</th>
                <th>F1 Perturbed</th>
                <th>Robustness Gap</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

</div>

<div class="footer">
    Built for Graph Robustness Challenge 🚀
</div>

<script>
function loadData(file, element = null) {

    fetch(file)
    .then(res => res.text())
    .then(data => {

        const rows = data.trim().split("\n").slice(1);

        let parsed = rows
            .map(r => r.split(","))
            .filter(r => r.length >= 5);

        // Sort by robustness_gap (LOWER = BETTER)
        parsed.sort((a, b) => parseFloat(a[4]) - parseFloat(b[4]));

        const table = document.getElementById("board");
        table.innerHTML = "";

        parsed.forEach((row, index) => {

            const rank = index + 1;

            const medal =
                rank === 1 ? "🥇" :
                rank === 2 ? "🥈" :
                rank === 3 ? "🥉" : rank;

            table.innerHTML += `
                <tr>
                    <td>${medal}</td>
                    <td>${row[1]}</td>
                    <td>${parseFloat(row[2]).toFixed(3)}</td>
                    <td>${parseFloat(row[3]).toFixed(3)}</td>
                    <td>${parseFloat(row[4]).toFixed(3)}</td>
                </tr>
            `;
        });

        // FIX tab highlight
        document.querySelectorAll(".tab")
            .forEach(t => t.classList.remove("active"));

        if (element) element.classList.add("active");

    })
    .catch(err => {
        console.error(err);
        document.getElementById("board").innerHTML =
            "<tr><td colspan='5'>⚠️ Failed to load leaderboard</td></tr>";
    });
}

// Load default
document.addEventListener("DOMContentLoaded", () => {
    loadData("leaderboard.csv");
});
</script>

</body>
</html>
